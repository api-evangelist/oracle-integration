specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Integration
providerId: oracle-integration
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Management
  - B2B Integration
  - Cloud Integration
  - iPaaS
  - Oracle Cloud
  - Process Automation
description: >-
  Oracle Integration (OIC, current generation Oracle Integration 3) is sold as
  an OCI service billed against per-hour service editions: Standard, Enterprise,
  and (where licensed) Healthcare. Each edition is provisioned with a number of
  message packs that scale concurrent message throughput; additional message
  packs can be added per hour. There is no free or freemium public tier; a
  trial is offered through Oracle Cloud Free Tier credits but is not a
  committed plan. Engage Oracle Sales for the per-hour edition and message-pack
  rates published on the Oracle Cloud Price List.
sources:
  - https://www.oracle.com/integration/integration-cloud/
  - https://docs.oracle.com/en/cloud/paas/application-integration/
  - https://www.oracle.com/cloud/price-list/
notes: >-
  Oracle blocks programmatic fetches of www.oracle.com pricing pages (HTTP 403).
  Plan structure preserved as a per-edition usage-based plan plus an enterprise
  agreement; replace per-hour message-pack price with the verified Oracle Cloud
  Price List value when available.
plans:
  - id: oracle-integration-standard
    name: Oracle Integration - Standard Edition
    type: usage-based
    description: >-
      Standard edition of Oracle Integration on OCI, billed per hour against
      the provisioned message-pack count. Suitable for application
      integrations across Oracle SaaS and common third-party SaaS connectors.
    entries:
      - label: Standard Edition Message Pack
        name: standard_message_pack
        type: metered
        metric: message-pack-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
      - label: Active Integrations
        name: active_integrations
        type: quota
        metric: integrations
        limit: 700
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Oracle Integration Developer API
      - name: Oracle Integration Process Automation API
      - name: Oracle Integration File Server API
      - name: Oracle Integration Administrative API
  - id: oracle-integration-enterprise-edition
    name: Oracle Integration - Enterprise Edition
    type: usage-based
    description: >-
      Enterprise edition of Oracle Integration on OCI, billed per hour against
      the provisioned message-pack count. Adds B2B for Oracle Integration,
      File Server, additional process-automation capacity, and the broader
      adapter library.
    entries:
      - label: Enterprise Edition Message Pack
        name: enterprise_message_pack
        type: metered
        metric: message-pack-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
      - label: File Server Storage
        name: file_server_storage
        type: quota
        metric: GB
        limit: 500
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Active Integrations
        name: active_integrations
        type: quota
        metric: integrations
        limit: 700
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Oracle Integration Developer API
      - name: Oracle Integration Process Automation API
      - name: Oracle Integration File Server API
      - name: Oracle Integration Administrative API
  - id: oracle-integration-healthcare
    name: Oracle Integration - Healthcare Edition
    type: usage-based
    description: >-
      Healthcare edition of Oracle Integration with HL7 / FHIR-oriented
      adapters and validation, billed per hour against the provisioned
      message-pack count. Available where regional licensing permits.
    entries:
      - label: Healthcare Edition Message Pack
        name: healthcare_message_pack
        type: metered
        metric: message-pack-hour
        limit: -1
        timeFrame: usage
        geo: configurable
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
    elements:
      - name: Oracle Integration Developer API
      - name: Oracle Integration Process Automation API
      - name: Oracle Integration File Server API
      - name: Oracle Integration Administrative API
  - id: oracle-integration-enterprise-agreement
    name: Enterprise Agreement
    type: enterprise
    description: >-
      Negotiated enterprise agreement covering Oracle Integration capacity
      across multiple OCI regions, with contractual SLAs, premier support,
      and named technical account management.
    entries:
      - label: Negotiated Message-Pack Hours
        name: negotiated_message_pack_hours
        type: subscription
        metric: message-pack-hour
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Oracle Integration Developer API
      - name: Oracle Integration Process Automation API
      - name: Oracle Integration File Server API
      - name: Oracle Integration Administrative API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
