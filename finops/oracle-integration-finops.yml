alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Oracle Integration
providerId: oracle-integration
publisherName: Oracle America, Inc.
serviceCategory: Integration / iPaaS
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - iPaaS
  - Cloud Integration
  - Oracle Cloud
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps view for Oracle Integration: per-hour billing of the
  service edition (Standard / Enterprise / Healthcare) multiplied by the
  provisioned message-pack count, plus separate OCI charges for outbound
  data transfer and any auxiliary OCI resources (object storage, identity
  domains). FinOps observation focuses on edition + message-pack utilization,
  active integrations, and File Server storage against the contractual
  edition.
sources:
  - https://www.oracle.com/integration/integration-cloud/
  - https://docs.oracle.com/en/cloud/paas/application-integration/
  - https://www.oracle.com/cloud/price-list/
notes: >-
  Per-hour message-pack price is not publicly fetchable. Track edition,
  message-pack hours, and active-integration count via OCI Cost Analysis and
  the Oracle Integration monitoring dashboards.
billingModel:
  pricingCategory: Pay-As-You-Go (Per-Edition Hourly)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Oracle Integration
  ServiceCategory: Integration / iPaaS
  ProviderName: Oracle
  PublisherName: Oracle America, Inc.
  InvoiceIssuerName: Oracle America, Inc.
  BillingCurrency: USD
  PricingCategory: Pay-As-You-Go
  ChargeCategory: Usage
meters:
  - name: oic_message_pack_hours
    description: Message-pack hours consumed by Oracle Integration instances
    unit: message-pack-hour
    aggregation: sum
    dimensions:
      - edition
      - region
      - instance
      - tag
  - name: oic_active_integrations
    description: Active integrations against the per-instance cap of 700
    unit: integrations
    aggregation: max
    dimensions:
      - instance
      - environment
  - name: oic_file_server_storage_gb
    description: File Server storage consumed against the 500 GB per-instance cap
    unit: GB
    aggregation: max
    dimensions:
      - instance
  - name: oic_outbound_email
    description: Daily outbound notification emails against the 10,000 per-instance cap
    unit: emails
    aggregation: sum
    dimensions:
      - instance
      - day
  - name: oci_egress_gb
    description: Outbound data transfer attributable to Oracle Integration
    unit: GB
    aggregation: sum
    dimensions:
      - region
principles:
  - name: Visibility
    description: >-
      Use OCI Cost Analysis with cost-tracking tags applied to each Oracle
      Integration instance, and the Oracle Integration monitoring dashboards
      for active integrations, message volume, and File Server consumption.
  - name: Allocation
    description: >-
      Apply cost-tracking tags (e.g. team, business_capability, environment)
      to each instance so iPaaS spend can be allocated back to the consuming
      product line.
  - name: Optimization
    description: >-
      Right-size message-pack count to peak concurrent messages, drop unused
      activated integrations to stay below the 700-integration cap, and
      consolidate low-volume tenants onto shared instances. Move bursty
      bulk workloads onto scheduled integrations to flatten message-pack
      demand.
  - name: Accountability
    description: >-
      Assign an integration center-of-excellence owner per instance; review
      message-pack utilization and edition fit at quarterly business
      reviews and at each renewal.
