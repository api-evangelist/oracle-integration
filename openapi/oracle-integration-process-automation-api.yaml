components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication via Oracle Identity Cloud Service.
      flows:
        authorizationCode:
          authorizationUrl: https://{idcs-url}/oauth2/v1/authorize
          tokenUrl: https://{idcs-url}/oauth2/v1/token
          scopes:
            urn:opc:resource:consumer::all: Full access
    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication with Oracle Integration credentials.
  parameters:
    limitParam:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema:
        type: integer
        default: 20
    offsetParam:
      name: offset
      in: query
      description: Number of items to skip.
      schema:
        type: integer
        default: 0
    processIdParam:
      name: processId
      in: path
      required: true
      description: Process instance identifier.
      schema:
        type: string
    taskIdParam:
      name: id
      in: path
      required: true
      description: Task identifier.
      schema:
        type: string
    spaceIdParam:
      name: spaceId
      in: path
      required: true
      description: Space identifier.
      schema:
        type: string
    decisionModelNameParam:
      name: decisionModelName
      in: path
      required: true
      description: Decision model name.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          example: https://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html
        title:
          type: string
          example: Not Found
        detail:
          type: string
          example: Process instance not found.
        status:
          type: integer
          example: 404
    ProcessDefinition:
      type: object
      properties:
        processDefId:
          type: string
          description: Process definition identifier.
          example: default~OrderApproval~1.0
        processName:
          type: string
          description: Process name.
          example: Order Approval
        revision:
          type: string
          description: Process revision.
          example: '1.0'
        status:
          type: string
          description: Definition status.
          example: ACTIVE
    ProcessDefinitionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProcessDefinition'
    ProcessMetadata:
      type: object
      properties:
        processDefId:
          type: string
          example: default~OrderApproval~1.0
        activities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: ReviewOrder
              type:
                type: string
                example: HUMAN_TASK
    ProcessInstance:
      type: object
      properties:
        processId:
          type: string
          description: Process instance identifier.
          example: '300456'
        processName:
          type: string
          description: Process name.
          example: Order Approval
        processDefId:
          type: string
          description: Process definition identifier.
          example: default~OrderApproval~1.0
        state:
          type: string
          description: Process state.
          enum:
            - OPEN
            - COMPLETED
            - FAULTED
            - ABORTED
          example: OPEN
        priority:
          type: integer
          description: Process priority.
          example: 3
        title:
          type: string
          description: Process title.
          example: Order #12345 Approval
        createdBy:
          type: string
          description: User who created the instance.
          example: admin@example.com
        createdDate:
          type: string
