openapi: 3.0.3
info:
  title: Oracle Integration Developer Adapters Lookups API
  description: Developer API for Oracle Integration 3 providing day-to-day management of integrations, connections, packages, libraries, lookups, certificates, scheduled integrations, monitoring, B2B trading partner operations, and rapid adapter building.
  version: 1.0.0
  contact:
    name: Oracle Integration Support
    email: oracle-integration-support@oracle.com
    url: https://www.oracle.com/support/
  license:
    name: Oracle Terms of Service
    url: https://www.oracle.com/legal/terms.html
  x-generated-from: documentation
  x-last-validated: '2026-04-18'
servers:
- url: https://{instance}.integration.ocp.oraclecloud.com
  description: Oracle Integration Cloud Instance
  variables:
    instance:
      default: myinstance
      description: Oracle Integration instance name
security:
- oauth2: []
- basicAuth: []
tags:
- name: Lookups
  description: Manage lookup tables for data mapping.
paths:
  /ic/api/integration/v1/lookups:
    get:
      operationId: listLookups
      summary: Oracle Integration List Lookups
      description: Retrieve a list of all lookup tables.
      tags:
      - Lookups
      parameters:
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: Successfully retrieved lookups.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createLookup
      summary: Oracle Integration Create Lookup
      description: Create a new lookup table.
      tags:
      - Lookups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LookupCreate'
      responses:
        '201':
          description: Lookup created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lookup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /ic/api/integration/v1/lookups/{name}:
    get:
      operationId: getLookup
      summary: Oracle Integration Get Lookup
      description: Retrieve a specific lookup by name.
      tags:
      - Lookups
      parameters:
      - name: name
        in: path
        required: true
        description: Lookup name.
        schema:
          type: string
      responses:
        '200':
          description: Lookup details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lookup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateLookup
      summary: Oracle Integration Update Lookup
      description: Update an existing lookup table.
      tags:
      - Lookups
      parameters:
      - name: name
        in: path
        required: true
        description: Lookup name.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LookupCreate'
      responses:
        '200':
          description: Lookup updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lookup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteLookup
      summary: Oracle Integration Delete Lookup
      description: Delete a lookup table.
      tags:
      - Lookups
      parameters:
      - name: name
        in: path
        required: true
        description: Lookup name.
        schema:
          type: string
      responses:
        '204':
          description: Lookup deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          description: Error type URI.
          example: https://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html#sec10.4.1
        title:
          type: string
          description: Short error title.
          example: Bad Request
        detail:
          type: string
          description: Detailed error message.
          example: Invalid connection identifier format.
        status:
          type: integer
          description: HTTP status code.
          example: 400
    LookupCreate:
      type: object
      properties:
        name:
          type: string
          description: Lookup name.
          example: COUNTRY_CODES
        description:
          type: string
          description: Lookup description.
          example: Country code mapping table.
        columns:
          type: array
          items:
            type: string
          example:
          - Common
          - Oracle
          - Salesforce
    LookupList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Lookup'
        totalResults:
          type: integer
          example: 5
        hasMore:
          type: boolean
          example: false
    Lookup:
      type: object
      properties:
        name:
          type: string
          description: Lookup name.
          example: COUNTRY_CODES
        description:
          type: string
          description: Lookup description.
          example: Country code mapping for address normalization.
        columns:
          type: array
          description: Lookup column names.
          items:
            type: string
          example:
          - Common
          - Oracle
          - Salesforce
        rows:
          type: array
          description: Lookup data rows.
          items:
            type: object
            additionalProperties:
              type: string
  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Bad request - invalid input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  parameters:
    limitParam:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema:
        type: integer
        default: 20
        example: 20
    offsetParam:
      name: offset
      in: query
      description: Number of items to skip before returning results.
      schema:
        type: integer
        default: 0
        example: 0
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication via Oracle Identity Cloud Service (IDCS).
      flows:
        authorizationCode:
          authorizationUrl: https://{idcs-url}/oauth2/v1/authorize
          tokenUrl: https://{idcs-url}/oauth2/v1/token
          scopes:
            urn:opc:resource:consumer::all: Full access to Oracle Integration APIs
    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication with Oracle Integration credentials.
