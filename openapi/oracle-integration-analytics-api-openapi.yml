openapi: 3.0.3
info:
  title: Oracle Integration Developer Adapters Analytics API
  description: Developer API for Oracle Integration 3 providing day-to-day management of integrations, connections, packages, libraries, lookups, certificates, scheduled integrations, monitoring, B2B trading partner operations, and rapid adapter building.
  version: 1.0.0
  contact:
    name: Oracle Integration Support
    email: oracle-integration-support@oracle.com
    url: https://www.oracle.com/support/
  license:
    name: Oracle Terms of Service
    url: https://www.oracle.com/legal/terms.html
  x-generated-from: documentation
  x-last-validated: '2026-04-18'
servers:
- url: https://{instance}.integration.ocp.oraclecloud.com
  description: Oracle Integration Cloud Instance
  variables:
    instance:
      default: myinstance
      description: Oracle Integration instance name
security:
- oauth2: []
- basicAuth: []
tags:
- name: Analytics
  description: Process analytics queries and data.
paths:
  /ic/api/process/v1/analyticsqueries:
    get:
      operationId: listAnalyticsQueries
      summary: Oracle Integration List Analytics Queries
      description: Retrieve a list of all analytics queries.
      tags:
      - Analytics
      responses:
        '200':
          description: Analytics queries retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsQueryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createOrExecuteAnalyticsQuery
      summary: Oracle Integration Create or Execute Analytics Query
      description: Create or execute an analytics query.
      tags:
      - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsQueryCreate'
      responses:
        '200':
          description: Query result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsQueryResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          example: https://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html
        title:
          type: string
          example: Not Found
        detail:
          type: string
          example: Process instance not found.
        status:
          type: integer
          example: 404
    AnalyticsQueryCreate:
      type: object
      properties:
        name:
          type: string
          description: Query name.
          example: Monthly Process Volume
        dataSource:
          type: string
          description: Data source name.
          example: ProcessInstances
        columns:
          type: array
          items:
            type: string
          example:
          - processName
          - state
          - createdDate
    AnalyticsQueryResult:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items:
              type: string
    AnalyticsQueryList:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              businessQueryId:
                type: string
                example: '100123'
              name:
                type: string
                example: Monthly Process Volume
  responses:
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication via Oracle Identity Cloud Service (IDCS).
      flows:
        authorizationCode:
          authorizationUrl: https://{idcs-url}/oauth2/v1/authorize
          tokenUrl: https://{idcs-url}/oauth2/v1/token
          scopes:
            urn:opc:resource:consumer::all: Full access to Oracle Integration APIs
    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication with Oracle Integration credentials.
