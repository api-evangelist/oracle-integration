openapi: 3.0.3
info:
  title: Oracle Integration Developer Adapters Certificates API
  description: Developer API for Oracle Integration 3 providing day-to-day management of integrations, connections, packages, libraries, lookups, certificates, scheduled integrations, monitoring, B2B trading partner operations, and rapid adapter building.
  version: 1.0.0
  contact:
    name: Oracle Integration Support
    email: oracle-integration-support@oracle.com
    url: https://www.oracle.com/support/
  license:
    name: Oracle Terms of Service
    url: https://www.oracle.com/legal/terms.html
  x-generated-from: documentation
  x-last-validated: '2026-04-18'
servers:
- url: https://{instance}.integration.ocp.oraclecloud.com
  description: Oracle Integration Cloud Instance
  variables:
    instance:
      default: myinstance
      description: Oracle Integration instance name
security:
- oauth2: []
- basicAuth: []
tags:
- name: Certificates
  description: Manage SSL certificates for secure connections.
paths:
  /ic/api/integration/v1/certificates:
    get:
      operationId: listCertificates
      summary: Oracle Integration List Certificates
      description: Retrieve a list of all certificates.
      tags:
      - Certificates
      responses:
        '200':
          description: Certificates retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: uploadCertificate
      summary: Oracle Integration Upload Certificate
      description: Upload a new certificate.
      tags:
      - Certificates
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Certificate file.
                alias:
                  type: string
                  description: Alias for the certificate.
                type:
                  type: string
                  description: Certificate type.
                  enum:
                  - trust
                  - identity
      responses:
        '201':
          description: Certificate uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          description: Error type URI.
          example: https://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html#sec10.4.1
        title:
          type: string
          description: Short error title.
          example: Bad Request
        detail:
          type: string
          description: Detailed error message.
          example: Invalid connection identifier format.
        status:
          type: integer
          description: HTTP status code.
          example: 400
    CertificateList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Certificate'
    Certificate:
      type: object
      properties:
        alias:
          type: string
          description: Certificate alias.
          example: salesforce-cert
        type:
          type: string
          description: Certificate type.
          enum:
          - trust
          - identity
          example: trust
        subject:
          type: string
          description: Certificate subject.
          example: CN=*.salesforce.com
        expiry:
          type: string
          format: date-time
          description: Certificate expiry date.
          example: '2027-12-31T23:59:59Z'
  responses:
    BadRequest:
      description: Bad request - invalid input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication via Oracle Identity Cloud Service (IDCS).
      flows:
        authorizationCode:
          authorizationUrl: https://{idcs-url}/oauth2/v1/authorize
          tokenUrl: https://{idcs-url}/oauth2/v1/token
          scopes:
            urn:opc:resource:consumer::all: Full access to Oracle Integration APIs
    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication with Oracle Integration credentials.
