naftiko: 1.0.0-alpha2
info:
  label: Oracle Integration Developer API — Packages
  description: 'Oracle Integration Developer API — Packages. 3 operations. Lead operation: Oracle Integration List Packages.
    Self-contained Naftiko capability covering one Oracle Integration business surface.'
  tags:
  - Oracle Integration
  - Packages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_INTEGRATION_API_KEY: ORACLE_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-packages
    baseUri: https://{instance}.integration.ocp.oraclecloud.com
    description: Oracle Integration Developer API — Packages business capability. Self-contained, no shared references.
    resources:
    - name: ic-api-integration-v1-packages
      path: /ic/api/integration/v1/packages
      operations:
      - name: listpackages
        method: GET
        description: Oracle Integration List Packages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ic-api-integration-v1-packages-packagename
      path: /ic/api/integration/v1/packages/{packagename}
      operations:
      - name: getpackage
        method: GET
        description: Oracle Integration Get Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: packagename
          in: path
          type: string
          description: Package name.
          required: true
      - name: deletepackage
        method: DELETE
        description: Oracle Integration Delete Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: packagename
          in: path
          type: string
          description: Package name.
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: developer-packages-rest
    port: 8080
    description: REST adapter for Oracle Integration Developer API — Packages. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ic/api/integration/v1/packages
      name: ic-api-integration-v1-packages
      description: REST surface for ic-api-integration-v1-packages.
      operations:
      - method: GET
        name: listpackages
        description: Oracle Integration List Packages
        call: developer-packages.listpackages
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ic/api/integration/v1/packages/{packagename}
      name: ic-api-integration-v1-packages-packagename
      description: REST surface for ic-api-integration-v1-packages-packagename.
      operations:
      - method: GET
        name: getpackage
        description: Oracle Integration Get Package
        call: developer-packages.getpackage
        with:
          packagename: rest.packagename
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepackage
        description: Oracle Integration Delete Package
        call: developer-packages.deletepackage
        with:
          packagename: rest.packagename
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-packages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Integration Developer API — Packages. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: oracle-integration-list-packages
      description: Oracle Integration List Packages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-packages.listpackages
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-integration-get-package
      description: Oracle Integration Get Package
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-packages.getpackage
      with:
        packagename: tools.packagename
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-integration-delete-package
      description: Oracle Integration Delete Package
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: developer-packages.deletepackage
      with:
        packagename: tools.packagename
      outputParameters:
      - type: object
        mapping: $.
