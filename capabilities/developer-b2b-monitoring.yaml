naftiko: 1.0.0-alpha2
info:
  label: Oracle Integration Developer API — B2B Monitoring
  description: 'Oracle Integration Developer API — B2B Monitoring. 2 operations. Lead operation: Oracle Integration List Business
    Messages. Self-contained Naftiko capability covering one Oracle Integration business surface.'
  tags:
  - Oracle Integration
  - B2B Monitoring
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_INTEGRATION_API_KEY: ORACLE_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-b2b-monitoring
    baseUri: https://{instance}.integration.ocp.oraclecloud.com
    description: Oracle Integration Developer API — B2B Monitoring business capability. Self-contained, no shared references.
    resources:
    - name: ic-api-b2b-v1-monitoring-businessmessages
      path: /ic/api/b2b/v1/monitoring/businessmessages
      operations:
      - name: listbusinessmessages
        method: GET
        description: Oracle Integration List Business Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ic-api-b2b-v1-monitoring-wiremessages
      path: /ic/api/b2b/v1/monitoring/wiremessages
      operations:
      - name: listwiremessages
        method: GET
        description: Oracle Integration List Wire Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ORACLE_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: developer-b2b-monitoring-rest
    port: 8080
    description: REST adapter for Oracle Integration Developer API — B2B Monitoring. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ic/api/b2b/v1/monitoring/businessmessages
      name: ic-api-b2b-v1-monitoring-businessmessages
      description: REST surface for ic-api-b2b-v1-monitoring-businessmessages.
      operations:
      - method: GET
        name: listbusinessmessages
        description: Oracle Integration List Business Messages
        call: developer-b2b-monitoring.listbusinessmessages
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ic/api/b2b/v1/monitoring/wiremessages
      name: ic-api-b2b-v1-monitoring-wiremessages
      description: REST surface for ic-api-b2b-v1-monitoring-wiremessages.
      operations:
      - method: GET
        name: listwiremessages
        description: Oracle Integration List Wire Messages
        call: developer-b2b-monitoring.listwiremessages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-b2b-monitoring-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Integration Developer API — B2B Monitoring. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: oracle-integration-list-business-messages
      description: Oracle Integration List Business Messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-b2b-monitoring.listbusinessmessages
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-integration-list-wire-messages
      description: Oracle Integration List Wire Messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-b2b-monitoring.listwiremessages
      outputParameters:
      - type: object
        mapping: $.
