      description: REST surface for ic-api-process-v1-identities-loggedInUser.
      operations:
      - method: GET
        name: getloggedinuser
        description: Oracle Integration Get Logged in User
        call: process-automation-identities.getloggedinuser
        outputParameters:
        - type: object
          mapping: $.
