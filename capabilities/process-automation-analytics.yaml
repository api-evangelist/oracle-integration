naftiko: 1.0.0-alpha2
info:
  label: Oracle Integration Process Automation API — Analytics
  description: 'Oracle Integration Process Automation API — Analytics. 2 operations. Lead operation: Oracle Integration List
    Analytics Queries. Self-contained Naftiko capability covering one Oracle Integration business surface.'
  tags:
  - Oracle Integration
  - Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_INTEGRATION_API_KEY: ORACLE_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: process-automation-analytics
    baseUri: https://{instance}.integration.ocp.oraclecloud.com
    description: Oracle Integration Process Automation API — Analytics business capability. Self-contained, no shared references.
    resources:
    - name: ic-api-process-v1-analyticsqueries
      path: /ic/api/process/v1/analyticsqueries
      operations:
      - name: listanalyticsqueries
        method: GET
        description: Oracle Integration List Analytics Queries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createorexecuteanalyticsquery
        method: POST
        description: Oracle Integration Create or Execute Analytics Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: process-automation-analytics-rest
    port: 8080
    description: REST adapter for Oracle Integration Process Automation API — Analytics. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/ic/api/process/v1/analyticsqueries
      name: ic-api-process-v1-analyticsqueries
      description: REST surface for ic-api-process-v1-analyticsqueries.
      operations:
      - method: GET
        name: listanalyticsqueries
        description: Oracle Integration List Analytics Queries
        call: process-automation-analytics.listanalyticsqueries
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorexecuteanalyticsquery
        description: Oracle Integration Create or Execute Analytics Query
        call: process-automation-analytics.createorexecuteanalyticsquery
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: process-automation-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Integration Process Automation API — Analytics. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: oracle-integration-list-analytics-queries
      description: Oracle Integration List Analytics Queries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: process-automation-analytics.listanalyticsqueries
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-integration-create-execute-analytics
      description: Oracle Integration Create or Execute Analytics Query
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: process-automation-analytics.createorexecuteanalyticsquery
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
