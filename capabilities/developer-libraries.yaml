naftiko: 1.0.0-alpha2
info:
  label: Oracle Integration Developer API — Libraries
  description: 'Oracle Integration Developer API — Libraries. 3 operations. Lead operation: Oracle Integration List Libraries.
    Self-contained Naftiko capability covering one Oracle Integration business surface.'
  tags:
  - Oracle Integration
  - Libraries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_INTEGRATION_API_KEY: ORACLE_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-libraries
    baseUri: https://{instance}.integration.ocp.oraclecloud.com
    description: Oracle Integration Developer API — Libraries business capability. Self-contained, no shared references.
    resources:
    - name: ic-api-integration-v1-libraries
      path: /ic/api/integration/v1/libraries
      operations:
      - name: listlibraries
        method: GET
        description: Oracle Integration List Libraries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ic-api-integration-v1-libraries-id
      path: /ic/api/integration/v1/libraries/{id}
      operations:
      - name: getlibrary
        method: GET
        description: Oracle Integration Get Library
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Library identifier.
          required: true
      - name: deletelibrary
        method: DELETE
        description: Oracle Integration Delete Library Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Library identifier.
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: developer-libraries-rest
    port: 8080
    description: REST adapter for Oracle Integration Developer API — Libraries. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ic/api/integration/v1/libraries
      name: ic-api-integration-v1-libraries
      description: REST surface for ic-api-integration-v1-libraries.
      operations:
      - method: GET
        name: listlibraries
        description: Oracle Integration List Libraries
        call: developer-libraries.listlibraries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ic/api/integration/v1/libraries/{id}
      name: ic-api-integration-v1-libraries-id
      description: REST surface for ic-api-integration-v1-libraries-id.
      operations:
      - method: GET
        name: getlibrary
        description: Oracle Integration Get Library
        call: developer-libraries.getlibrary
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletelibrary
        description: Oracle Integration Delete Library Version
        call: developer-libraries.deletelibrary
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-libraries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Integration Developer API — Libraries. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: oracle-integration-list-libraries
      description: Oracle Integration List Libraries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-libraries.listlibraries
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-integration-get-library
      description: Oracle Integration Get Library
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-libraries.getlibrary
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-integration-delete-library-version
      description: Oracle Integration Delete Library Version
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: developer-libraries.deletelibrary
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
